# Minimal single-binary Loki for the frr-visible lab: filesystem storage,
# no auth. promtail pushes all container stdout here; Grafana queries via the
# Loki datasource. Doubles as the sink for future frr-net governance audit logs.
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  allow_structured_metadata: true
  retention_period: 168h        # 7 天,实验够用
  # 首次回填(gnmic-frr 啰嗦日志 + 今天多次重启的累积)会撞默认 4MB/s 限流,放宽
  ingestion_rate_mb: 64
  ingestion_burst_size_mb: 128
  per_stream_rate_limit: 64MB
  per_stream_rate_limit_burst: 128MB
  reject_old_samples: false     # 允许回填旧日志

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  delete_request_store: filesystem

analytics:
  reporting_enabled: false
