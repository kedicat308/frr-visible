# router:v2 设备日志子系统:汇聚 /dev/log(FRR L3 + netlink agent L2 + 系统),
# 用 RFC5424/TCP remote syslog 转发给收集器(promtail syslog 接收器)。
# 刻意不加载 imklog:容器内 /dev/kmsg 是宿主内核日志、不按 namespace 隔离,
# L2/链路事件改由 box-init.sh 的 netlink agent(本 netns)采集,更像真设备。
global(workDirectory="/var/spool/rsyslog")
module(load="imuxsock")          # 本地 /dev/log:FRR、logger、系统

# __COLLECTOR__ 由 box-init.sh 按 $COLLECTOR 环境变量替换;RFC5424 over TCP,
# 收集器暂时不可达时本地排队重试(设备不丢日志)。
action(type="omfwd"
       target="__COLLECTOR__" port="1514" protocol="tcp"
       template="RSYSLOG_SyslogProtocol23Format"
       action.resumeRetryCount="-1"
       queue.type="linkedList")   # 内存队列(避开 apparmor 对磁盘队列路径的限制)
