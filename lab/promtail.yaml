# promtail — Docker 服务发现:自动 tail 所有容器的 stdout,推给 Loki。
# 无需每容器单配;新起的容器(含 clab 节点)也会被自动发现。
server:
  http_listen_port: 9080
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # ① 基础设施容器 stdout(prometheus/tempo/exporter/grafana… 及 clab 节点)
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: stream
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: service
      - source_labels: ['__meta_docker_container_label_clab_node_name']
        target_label: clab_node

  # ② 设备级 remote syslog 接收器(router:v2 车队像真交换机那样发来的)
  #    RFC5424/TCP :1514;host=设备名(rsyslog %hostname%),app=daemon(zebra/bgpd/
  #    ospfd/ldpd/netlink/bridge…),level=severity。迁真设备时这条路径不变。
  - job_name: syslog
    syslog:
      listen_address: 0.0.0.0:1514
      listen_protocol: tcp
      idle_timeout: 120s
      label_structured_data: false
      labels:
        job: syslog
    relabel_configs:
      - source_labels: ['__syslog_message_hostname']
        target_label: host
      - source_labels: ['__syslog_message_app_name']
        target_label: app
      - source_labels: ['__syslog_message_severity']
        target_label: level
