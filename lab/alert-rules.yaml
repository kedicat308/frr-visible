# Grafana 统一告警(provisioning)。故障域:接口/OSPF/BGP/VPN/MPLS + 遥测健康/采集器。
# 判据基于现有指标;count(...==6) or vector(0) 保证总为数值(掉到 0 也能触发,不落 NoData)。
# 通知:走内置默认策略/联系点 = 仅在 Grafana 告警页显示,不外发。
# 说明:on-change 采集器若僵死会让多条同时掉到 0 → "遥测健康僵死" 告警会一并亮,
#       提示是采集器问题而非真故障(手动 docker restart gnmic-frr)。for 时长过滤瞬时抖动。
apiVersion: 1
groups:
  - orgId: 1
    name: frr-faults
    folder: FRR-visible
    interval: 1m
    rules:
      - uid: frr-bgp-degraded
        title: "BGP 会话降级"
        condition: C
        for: 5m
        labels: { severity: critical, domain: bgp }
        annotations: { summary: "已建立的 BGP 会话 < 10(基线10),有邻居掉了" }
        noDataState: Alerting
        execErrState: Error
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model: { refId: A, instant: true, expr: "count(openconfig_network_instances_network_instance_protocols_protocol_bgp_neighbors_neighbor_state_session_state == 6) or vector(0)" }
          - refId: C
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: lt, params: [10] }

      - uid: frr-vpn-pece-down
        title: "VPN PE-CE 会话中断"
        condition: C
        for: 5m
        labels: { severity: critical, domain: vpn }
        annotations: { summary: "vrf=cust 的 PE-CE eBGP 已建立 < 4(基线4),某客户站点断了" }
        noDataState: Alerting
        execErrState: Error
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model: { refId: A, instant: true, expr: "count(openconfig_network_instances_network_instance_protocols_protocol_bgp_neighbors_neighbor_state_session_state{network_instance_name=\"cust\"} == 6) or vector(0)" }
          - refId: C
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: lt, params: [4] }

      - uid: frr-vpn-routes-drop
        title: "VPN 路由/标签数下降"
        condition: C
        for: 5m
        labels: { severity: warning, domain: vpn }
        annotations: { summary: "L3VPN 带标签路由数 < 20(基线20),VPN 标签分发异常" }
        noDataState: Alerting
        execErrState: Error
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model: { refId: A, instant: true, expr: "count(frr_bgp_rib_afi_safis_afi_safi_routes_route_state_label) or vector(0)" }
          - refId: C
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: lt, params: [20] }

      - uid: frr-ospf-degraded
        title: "OSPF 邻接降级"
        condition: C
        for: 5m
        labels: { severity: warning, domain: ospf }
        annotations: { summary: "FULL 的 OSPF 邻接 < 6(基线6)" }
        noDataState: Alerting
        execErrState: Error
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model: { refId: A, instant: true, expr: "count(openconfig_network_instances_network_instance_protocols_protocol_ospfv2_areas_area_interfaces_interface_neighbors_neighbor_state_adjacency_state == 6) or vector(0)" }
          - refId: C
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: lt, params: [6] }

      - uid: frr-mpls-lfib-drop
        title: "MPLS 转发面故障(LFIB)"
        condition: C
        for: 5m
        labels: { severity: warning, domain: mpls }
        annotations: { summary: "MPLS LFIB 标签转发项 < 20(基线20),LDP/标签分发异常(shim 不 serve LDP 邻居,以 LFIB 为准)" }
        noDataState: Alerting
        execErrState: Error
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model: { refId: A, instant: true, expr: "count(frr_mpls_lfib_entry_state_next_hop) or vector(0)" }
          - refId: C
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: lt, params: [20] }

      - uid: frr-iface-down
        title: "接口 down(数据链路)"
        condition: C
        for: 2m
        labels: { severity: warning, domain: interface }
        annotations: { summary: "UP 的 p2p 数据接口 < 14(基线14),有链路 down" }
        noDataState: Alerting
        execErrState: Error
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model: { refId: A, instant: true, expr: "count(openconfig_interfaces_interface_state_oper_status{interface_name=~\".+-.+\"} == 1) or vector(0)" }
          - refId: C
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: lt, params: [14] }

      - uid: frr-telemetry-stale
        title: "遥测 on-change 僵死"
        condition: C
        for: 5m
        labels: { severity: warning, domain: telemetry }
        annotations: { summary: "BGP/OSPF/FIB on-change 序列消失(采集器订阅僵死)。手动 docker restart gnmic-frr" }
        noDataState: Alerting
        execErrState: Error
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model: { refId: A, instant: true, expr: "clamp_max((count(openconfig_network_instances_network_instance_protocols_protocol_bgp_neighbors_neighbor_state_session_state) or vector(0)),1) * clamp_max((count(openconfig_network_instances_network_instance_protocols_protocol_ospfv2_areas_area_interfaces_interface_neighbors_neighbor_state_adjacency_state) or vector(0)),1) * clamp_max((count(openconfig_network_instances_network_instance_afts_ipv4_unicast_ipv4_entry_state_next_hop) or vector(0)),1)" }
          - refId: C
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: lt, params: [1] }

      - uid: frr-collector-down
        title: "采集器掉线(gnmic-frr)"
        condition: C
        for: 2m
        labels: { severity: critical, domain: telemetry }
        annotations: { summary: "gnmic-frr 抓取目标 down,全部指标停更" }
        noDataState: Alerting
        execErrState: Error
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model: { refId: A, instant: true, expr: "up{job=\"gnmic-frr\"}" }
          - refId: C
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: lt, params: [1] }
